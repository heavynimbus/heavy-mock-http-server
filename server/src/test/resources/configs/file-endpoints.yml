# Declaration of endpoints
endpoints:
  - name: Get Hello JSON

    # If the request matches the following criteria, the response will be returned
    request:
      methods:
        - GET
      paths:
        - /hello/? # This is a regular expression
      headers:
        Accept:
          - application/json

    # The response to be returned
    response:
      status: OK
      headers:
        "Content-Type":
          - application/json
      body:
        file: src/test/resources/files/hello.json

  - name: Get Hello HTML
    # If the request matches the following criteria, the response will be returned
    request:
      methods:
        - GET
      paths:
        - /hello/? # This is a regular expression
      headers:
        Accept:
          - text/html

    # The response to be returned
    response:
      status: OK
      headers:
        "Content-Type":
          - text/html
      body:
        file: src/test/resources/files/hello.html